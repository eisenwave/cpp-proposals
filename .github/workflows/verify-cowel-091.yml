name: Verify docs

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install cowel
        run: npm install -g cowel@0.9.1

      - name: Verify docs match sources
        run: bash scripts/verify-docs.sh
